sonar.sources=src
sonar.tests=tests,e2e,src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/*.d.ts,**/docs/**,**/public/**,**/scripts/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/app/**/*,src/types/**,src/instrumentation*.ts,src/proxy.ts,src/lib/docs.ts,src/lib/projects/repo-to-project.ts,src/lib/search/build-index.ts,src/lib/github/cache.ts
sonar.qualitygate.wait=true
